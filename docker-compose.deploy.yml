services:
  backend:
    image: ${REGISTRY:-localhost:5000}/${IMAGE_NAMESPACE:-magiceffect}/magiceffect-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: magiceffect-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      APP_PORT: 8080
      GITEA_URL: ${GITEA_URL:-http://127.0.0.1:3000}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET:-}
      DATA_DIR: /data
      USE_AGNO: ${USE_AGNO:-false}
      AGNO_URL: ${AGNO_URL:-http://agno-agent:8100}
    volumes:
      - /mnt/HDD/projects/MagicEffect/data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_HOST_PORT:-13003}:8080"
    depends_on:
      redis:
        condition: service_started
      agno-agent:
        condition: service_healthy

  frontend:
    image: ${REGISTRY:-localhost:5000}/${IMAGE_NAMESPACE:-magiceffect}/magiceffect-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: magiceffect-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8080}
      PORT: 3000
    ports:
      - "${FRONTEND_HOST_PORT:-18083}:3000"
    depends_on:
      - backend

  agno-agent:
    image: ${REGISTRY:-localhost:5000}/${IMAGE_NAMESPACE:-magiceffect}/magiceffect-agno-agent:${AGNO_IMAGE_TAG:-latest}
    container_name: magiceffect-agno-agent
    restart: unless-stopped
    environment:
      AGNO_TELEMETRY: "false"
    ports:
      - "${AGNO_HOST_PORT:-18100}:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    image: ${REGISTRY:-localhost:5000}/${IMAGE_NAMESPACE:-magiceffect}/magiceffect-backend:${WORKER_IMAGE_TAG:-latest}
    container_name: magiceffect-worker
    restart: unless-stopped
    command: ["node", "dist/worker/index.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
    profiles:
      - worker

  redis:
    image: redis:7-alpine
    container_name: magiceffect-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
